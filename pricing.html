<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pricing moved | Dibyajyoti Kabi Portfolio v2</title>
  <meta name="description" content="Dibyajyoti Kabi pricing is now available inside the main portfolio page." />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://dibyajyotikabi.com/#pricing" />
  <meta http-equiv="refresh" content="0; url=/#pricing" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0a0a;
      --card: #161616;
      --text: #ffffff;
      --muted: #9ca3af;
      --border: #2a2a2a;
      --accent: #2f6df6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      background:
        linear-gradient(135deg, rgba(47, 109, 246, 0.12), transparent 40%),
        var(--bg);
      color: var(--text);
      font-family: Manrope, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(440px, 100%);
      padding: 1.5rem;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--card);
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.75rem, 8vw, 2.35rem);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0 0 1.25rem;
      color: var(--muted);
      line-height: 1.65;
    }

    a {
      display: inline-flex;
      width: 100%;
      justify-content: center;
      padding: 0.85rem 1rem;
      border-radius: 12px;
      background: var(--text);
      color: var(--bg);
      font-weight: 800;
      text-decoration: none;
    }
  </style>
  <script>
    window.location.replace('/#pricing');
  </script>
</head>
<body>
  <main>
    <h1>Pricing moved</h1>
    <p>The pricing section now lives inside the main Dibyajyoti Kabi Portfolio v2 page.</p>
    <a href="/#pricing">View pricing</a>
  </main>
</body>
</html>
